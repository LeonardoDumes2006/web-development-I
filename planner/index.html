<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Planner</h1>
        
        <div class="layout-wrapper">
            <section class="planner-container">
                <div class="planner-week-day">Dom</div>
                <div class="planner-week-day">Seg</div>
                <div class="planner-week-day">Ter</div>
                <div class="planner-week-day">Qua</div>
                <div class="planner-week-day">Qui</div>
                <div class="planner-week-day">Sex</div>
                <div class="planner-week-day">Sáb</div>
    
                <div class="planner-day"><div class="day">1</div></div>
                <div class="planner-day"><div class="day">2</div></div>
                <div class="planner-day"><div class="day">3</div></div>
                <div class="planner-day"><div class="day">4</div></div>
                <div class="planner-day"><div class="day">5</div></div>
                <div class="planner-day"><div class="day">6</div></div>
                <div class="planner-day"><div class="day">7</div></div>
                <div class="planner-day"><div class="day">8</div></div>
                <div class="planner-day"><div class="day">9</div></div>
                <div class="planner-day"><div class="day">10</div></div>
                <div class="planner-day"><div class="day">11</div></div>
                <div class="planner-day"><div class="day">12</div></div>
                <div class="planner-day"><div class="day">13</div></div>
                <div class="planner-day"><div class="day">14</div></div>
                <div class="planner-day"><div class="day">15</div></div>
                <div class="planner-day"><div class="day">16</div></div>
                <div class="planner-day"><div class="day">17</div></div>
                <div class="planner-day"><div class="day">18</div></div>
                <div class="planner-day"><div class="day">19</div></div>
                <div class="planner-day"><div class="day">20</div></div>
                <div class="planner-day"><div class="day">21</div></div>
                <div class="planner-day"><div class="day">22</div></div>
                <div class="planner-day"><div class="day">23</div></div>
                <div class="planner-day"><div class="day">24</div></div>
                <div class="planner-day"><div class="day">25</div></div>
                <div class="planner-day"><div class="day">26</div></div>
                <div class="planner-day"><div class="day">27</div></div>
                <div class="planner-day"><div class="day">28</div></div>
                <div class="planner-day"><div class="day">29</div></div>
                <div class="planner-day"><div class="day">30</div></div>
                <div class="planner-day">
                <div class="day">31</div>
                <ul class="todo-list">
                    <li>Fazer compras no mercado</li>
                    <li>Estudar HTML e CSS</li>
                    <li>Pagar contas de luz e internet</li>
                    <li>Agendar médico</li>
                </ul>
            </div>
            </section> 
        <aside class="notes-section">
            <h2 class="notes-title">Anotações</h2>
            <textarea class="notes-textarea" placeholder="Escreva suas ideias e lembretes aqui...">

            </textarea>
        </aside>
            
            <footer class="bottom-section">
                <h2>Lista de Tarefas da Semana</h2>
                <ul class="main-tasks">
                    <li>
                        <input type="checkbox" id="task1">
                        <label for="task1">Fazer compras no mercado</label>
                    </li>
                    <li>
                        <input type="checkbox" id="task2">
                        <label for="task2">Estudar HTML e CSS</label>
                    </li>
                    <li>
                        <input type="checkbox" id="task3">
                        <label for="task3">Pagar contas de luz e internet</label>
                    </li>
                    <li>
                        <input type="checkbox" id="task4">
                        <label for="task4">Agendar médico</label>
                    </li>
                </ul>
            </footer>

        </div>
    </main>
</body>
</html>
