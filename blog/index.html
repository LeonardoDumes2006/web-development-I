<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .img-banner {
            width: 100%;
            height: 350px; 
            object-fit: cover;
        }
        
        .img-galeria {
            width: 100%;
            height: 220px; 
            object-fit: cover;
        }

        .img-miniatura {
            width: 120px; 
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .img-lateral {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-light">

<div class="container bg-white shadow-sm mt-4 mb-5 p-4 border rounded">

    <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <h2 class="m-0 fw-bold">MEU SITE</h2>
        <button class="btn btn-outline-secondary btn-sm px-3">Busca / Menu</button>
    </header>

    <div class="row mb-5">
        <div class="col-12">
            <img src="img/WhatsApp Image 2026-03-26 at 22.49.21.jpeg" alt="Banner Principal" class="img-banner rounded bg-secondary bg-opacity-25">
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-md-4 mb-3">
            <img src="img/foto de perfil.jpg" alt="Imagem 1" class="img-galeria rounded bg-secondary bg-opacity-25">
        </div>
        
        <div class="col-md-4 mb-3">
            <img src="img/foto serra rio do rastro.jpg" alt="Imagem 2" class="img-galeria rounded bg-secondary bg-opacity-25">
        </div>
        
        <div class="col-md-4 mb-3">
            <img src="img/WhatsApp Image 2026-03-26 at 22.48.09.jpeg" alt="Imagem 3" class="img-galeria rounded bg-secondary bg-opacity-25">
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-md-6 mb-4">
            <div class="d-flex border p-3 rounded h-100 shadow-sm">
                <img src="img/WhatsApp Image 2026-03-26 at 22.55.24.jpeg" alt="Miniatura 1" class="img-miniatura rounded bg-secondary bg-opacity-25 me-3">
                
                <div class="d-flex flex-column justify-content-center">
                    <h5 class="fw-bold mb-2">Título da Postagem 1</h5>
                    <p class="text-muted small mb-0">Texto de exemplo para postagem 1.</p>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="d-flex border p-3 rounded h-100 shadow-sm">
                <img src="img/WhatsApp Image 2026-03-26 at 22.55.49.jpeg" alt="Miniatura 2" class="img-miniatura rounded bg-secondary bg-opacity-25 me-3">
                
                <div class="d-flex flex-column justify-content-center">
                    <h5 class="fw-bold mb-2">Título da Postagem 2</h5>
                    <p class="text-muted small mb-0">Texto de exemplo para postagem 2</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row border-top pt-4 mt-2">
        
        <div class="col-md-9 mb-3 pe-md-4">
            <h4 class="fw-bold mb-3">Sobre o nosso Blog</h4>
            <p class="text-muted">Texto de teste. Aqui você pode escrever a descrição do seu blog, seus contatos ou outras informações relevantes para os seus leitores.</p>
        </div>

        <div class="col-md-3 mb-3">
            <img src="img/WhatsApp Image 2026-03-26 at 22.53.04.jpeg" alt="Imagem Lateral 20%" class="img-lateral rounded bg-secondary bg-opacity-25">
        </div>
        
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
