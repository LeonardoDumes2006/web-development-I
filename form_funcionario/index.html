<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
    <title>Formulário de Funcionário</title>
</head>
<body>
    <div class="container mt-4 mb-5">
        
        <div class="row">
            <div class="col text-center">
                <h4 class="mb-4">Formulário de Funcionário</h4>
            </div>
        </div>
            
        <form>
            <div class="row mb-3">
                <div class="col-8">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome">
                </div>
                <div class="col-4">
                    <label for="data" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" id="data">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-3">
                    <label for="sexo" class="form-label">Sexo</label>
                    <select class="form-select" id="sexo">
                        <option selected disabled>Selecione...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="O">Outro</option>
                    </select>
                </div>
                <div class="col-3">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf">
                </div>
                <div class="col-3">
                    <label for="rg" class="form-label">RG</label>
                    <input type="text" class="form-control" id="rg">
                </div>
                <div class="col-3">
                    <label for="tituloEleitoral" class="form-label">Título Eleitoral</label>
                    <input type="text" class="form-control" id="tituloEleitoral">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-3">
                    <label for="cep" class="form-label">CEP</label>
                    <input type="text" class="form-control" id="cep">
                </div>
                <div class="col-7">
                    <label for="rua" class="form-label">Rua</label>
                    <input type="text" class="form-control" id="rua">
                </div>
                <div class="col-2">
                    <label for="numero" class="form-label">Número</label>
                    <input type="text" class="form-control" id="numero">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-5">
                    <label for="bairro" class="form-label">Bairro</label>
                    <input type="text" class="form-control" id="bairro">
                </div>
                <div class="col-5">
                    <label for="cidade" class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade">
                </div>
                <div class="col-2">
                    <label for="estado" class="form-label">Estado (UF)</label>
                    <input type="text" class="form-control" id="estado" maxlength="2">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-3">
                    <label for="telResidencial" class="form-label">Telefone Residencial</label>
                    <input type="tel" class="form-control" id="telResidencial">
                </div>
                <div class="col-3">
                    <label for="telCelular" class="form-label">Telefone Celular</label>
                    <input type="tel" class="form-control" id="telCelular">
                </div>
                <div class="col-3">
                    <label for="instagram" class="form-label">Instagram</label>
                    <input type="text" class="form-control" id="instagram">
                </div>
                <div class="col-3">
                    <label for="facebook" class="form-label">Facebook</label>
                    <input type="text" class="form-control" id="facebook">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-4">
                    <label for="numFilhos" class="form-label">Número de Filhos</label>
                    <input type="number" class="form-control" id="numFilhos" min="0">
                </div>
                <div class="col-8">
                    <label for="salario" class="form-label">Salário</label>
                    <input type="number" class="form-control" id="salario" step="0.01" min="0">
                </div>
            </div>

            <div class="row mt-4">
                <div class="col text-end">
                    <button type="submit" class="btn btn-dark">Salvar Cadastro</button>
                </div>
            </div>
        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
