<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--leia o mês como numero e informe o nome por extenso dele-->
    <script lang="javascript" type="text/javascript">
        mes = prompt("Digite o número do mês: ", "0");
        switch (mes) {
            case "1":
                document.writeln("Janeiro");
                break;
            case "2":
                document.writeln("Fevereiro");
                break;
            case "3":
                document.writeln("Março");
                break;
            case "4":
                document.writeln("Abril");
                break;
            case "5":
                document.writeln("Maio");
                break;
            case "6":
                document.writeln("Junho");
                break;
            case "7":
                document.writeln("Julho");
                break;
            case "8":
                document.writeln("Agosto");
                break;
            case "9":
                document.writeln("Setembro");
                break;
            case "10":
                document.writeln("Outubro");
                break;
            case "11":
                document.writeln("Novembro");
                break;
            case "12":
                document.writeln("Dezembro");
                break;
            default:
                document.writeln("Número inválido. Por favor, digite um número entre 1 e 12.");
        }
    </script>
</body>
</html>
