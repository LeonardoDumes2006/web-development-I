<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--leia o dia da semana como numero e informe o nome por extenso dele;-->
     <script lang="javascript" type="text/javascript">
          dia_semana = prompt("Digite o dia da semana: ", "0");
            switch (dia_semana) {
                case "1":
                    document.writeln("Domingo");
                    break;
                case "2":
                    document.writeln("Segunda-feira");
                    break;
                case "3":
                    document.writeln("Terça-feira");
                    break;
                case "4":
                    document.writeln("Quarta-feira");
                    break;
                case "5":
                    document.writeln("Quinta-feira");
                    break;
                case "6":
                    document.writeln("Sexta-feira");
                    break;
                case "7":
                    document.writeln("Sábado");
                    break;
                default:
                    document.writeln("Número inválido. Por favor, digite um número entre 1 e 7.");
            }
     </script>
  
</body>
</html>
