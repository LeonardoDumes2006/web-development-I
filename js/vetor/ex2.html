<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício - Vetor de Idades</title>
    <!-- Descrição:
    usando uma fila, leia dados de cinco funcionários e mostre em uma tabela. Dados a serem lidos <id, nome, salário, idade>;
    usando os dados do exercício anterior, mostre o nome do funcionário mais novo e a idade do funcionário que tem o maior salário.
    -->
</head>
<body>
    <h2>Resultados do Vetor de Idades</h2>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Resultados da Fila de Funcionários</h2>

    <script type="text/javascript">
     
        let filaFuncionarios = [];

        alert("Cadastro de 5 Funcionários");

        // Lendo os dados de 5 funcionários
        for (let i = 0; i < 5; i++) {
            let id = prompt(`Funcionário ${i + 1} de 5 - Digite o ID:`);
            let nome = prompt(`Funcionário ${i + 1} de 5 - Digite o Nome:`);
            let salario = parseFloat(prompt(`Funcionário ${i + 1} de 5 - Digite o Salário:`)) || 0;
            let idade = parseInt(prompt(`Funcionário ${i + 1} de 5 - Digite a Idade:`)) || 0;

            // Inserindo o funcionário na fila (array de objetos)
            filaFuncionarios.push({ id: id, nome: nome, salario: salario, idade: idade });
        }

        document.write("<h3>Tabela de Cadastros</h3>");
        document.write("<table>");
        document.write("<tr><th>ID</th><th>Nome</th><th>Salário (R$)</th><th>Idade</th></tr>");
        
        for (let i = 0; i < filaFuncionarios.length; i++) {
            let f = filaFuncionarios[i];
            // toFixed(2) garante que o salário mostre os centavos (ex: 1200.00)
            document.write(`<tr><td>${f.id}</td><td>${f.nome}</td><td>${f.salario.toFixed(2)}</td><td>${f.idade}</td></tr>`);
        }
        document.write("</table>");

        if (filaFuncionarios.length > 0) {
            
           
            let funcMaisNovo = filaFuncionarios[0];
            let funcMaiorSalario = filaFuncionarios[0];

            for (let i = 1; i < filaFuncionarios.length; i++) {
                

                if (filaFuncionarios[i].idade < funcMaisNovo.idade) {
                    funcMaisNovo = filaFuncionarios[i];
                }
            
                if (filaFuncionarios[i].salario > funcMaiorSalario.salario) {
                    funcMaiorSalario = filaFuncionarios[i];
                }
            }

            document.write("<h3>Análise dos Dados</h3>");
            document.write(`<p>Nome do funcionário mais novo: <strong>${funcMaisNovo.nome}</strong> (Idade: ${funcMaisNovo.idade} anos)</p>`);
            document.write(`<p>Idade do funcionário com maior salário: <strong>${funcMaiorSalario.idade} anos</strong> (Salário: R$ ${funcMaiorSalario.salario.toFixed(2)})</p>`);
        
        } else {
            document.write("<p>Nenhum dado foi inserido.</p>");
        }

    </script>
</body>
</html>
</body>
</html>
