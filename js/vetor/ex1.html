<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício - Vetor de Idades</title>
    <!-- Descrição:
    leia 10 idades e guarde em um vetor. Ao final, mostre como lista não ordenada;
    mostre a lista anterior de modo ordenado crescente;
    idem, de modo ordenado decrescente;
    -->
</head>
<body>
    <h2>Resultados do Vetor de Idades</h2>

    <script type="text/javascript">
        let idades = new Array(10);
        
        
        for (let i = 0; i < idades.length; i++) {
            idades[i] = parseInt(prompt(`Digite a idade ${i + 1} de 10:`, "0"));
        }

        document.write("<p><strong>Idades (Ordem Original):</strong> " + idades + " " + "</p>");

     
        let ordenadoCrescente = [...idades].sort((a, b) => a - b);
        document.write("<p><strong>Idades (Ordem Crescente):</strong> " + ordenadoCrescente + " " + "</p>");

       
        let ordenadoDecrescente = [...idades].sort((a, b) => b - a);
        document.write("<p><strong>Idades (Ordem Decrescente):</strong> " + ordenadoDecrescente + " " + "</p>");

    </script>
</body>
</html>
