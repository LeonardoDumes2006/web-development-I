<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script lang="javascript" type="text/javascript">
            // Leia 3 números e mostre o maior deles.
            num1 = prompt("Digite o primeiro número:", "0");
            num2 = prompt("Digite o segundo número:", "0");
            num3 = prompt("Digite o terceiro número:", "0");

            if (num1 >= num2 && num1 >= num3) {
                document.writeln("O maior número é: " + num1);
            } else if (num2 >= num1 && num2 >= num3) {
                document.writeln("O maior número é: " + num2);
            } else {
                document.writeln("O maior número é: " + num3);
            }
    </script>
</body>
</html>
